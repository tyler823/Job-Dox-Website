[build]
  command   = "cd app && npm install && npm run build"
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyAFwSEDPqKgAUbwbh_2KZNwLDdGCZEiq3E"

# ── SPA routing for React portal ──
[[redirects]]
  from   = "/app/*"
  to     = "/app/dist/index.html"
  status = 200
[[redirects]]
  from   = "/portal/*"
  to     = "/app/dist/index.html"
  status = 200

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── CortexAI function — tighter headers ──
[[headers]]
  for = "/.netlify/functions/cortex-generate"
  [headers.values]
    Access-Control-Allow-Origin = "https://job-dox.ai"
    Cache-Control               = "no-store"
