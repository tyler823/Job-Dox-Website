# ══════════════════════════════════════════════════
#  Job-Dox · netlify.toml
#  Marketing site at root + Vite app in /app
# ══════════════════════════════════════════════════

[build]
  command = "cd app && npm install && npm run build"
  publish = "."

# ── SPA routing for the portal app ────────────────
[[redirects]]
  from   = "/app/*"
  to     = "/app/dist/index.html"
  status = 200

[[redirects]]
  from   = "/portal/*"
  to     = "/app/dist/index.html"
  status = 200

# ── Security headers ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
