// Wait for Memberstack SDK to initialise
function waitForMS() {
  return new Promise(resolve => {
    const check = () => window.$memberstackDom ? resolve(window.$memberstackDom) : setTimeout(check, 150);
    check();
  });
}

// Derive a display name from the Memberstack member object
function getMemberName(m) {
  const cf = m.customFields || {};
  const first = cf.firstName || cf["first-name"] || "";
  const last  = cf.lastName  || cf["last-name"]  || "";
  if (first || last) return `${first} ${last}`.trim();
  return m.auth?.email?.split("@")[0] || "Field Tech";
}

/* ── Invite Code Screen ──────────────────────────────────────────────────────
   Shown when the Memberstack member is authenticated but has no company-id
   custom field yet. Entering a valid code sets that field via Memberstack's
   updateMember() — the exact same mechanism the portal uses for staff invites.
   After this runs, both apps share the same company-id with no duplication.
─────────────────────────────────────────────────────────────────────────── */
function InviteCodeScreen({ member, onLinked }) {
  const [code,    setCode]    = useState("");
  const [err,     setErr]     = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    const c = code.trim().toUpperCase();
    if (!c) { setErr("Enter the invite code your office sent you."); return; }
    setErr(""); setLoading(true);
    try {
      const snap = await db.collection("fieldInviteCodes").doc(c).get();
      if (!snap.exists()) { setErr("Code not found — check for typos or ask your office for a new one."); setLoading(false); return; }
      const data = snap.data();
      if (data.used) { setErr("This code has already been used. Ask your office to generate a new one."); setLoading(false); return; }

      const { companyId, companyName } = data;

      // Write company-id into Memberstack custom fields.
      // This is the SAME field the portal reads on login, so there is one
      // source of truth and no duplicate auth records.
      const ms = await waitForMS();
      await ms.updateMember({ customFields: { "company-id": companyId } });

      // Mark code used
      await db.collection("fieldInviteCodes").doc(c).update({
        used: true, usedBy: member.id,
        usedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      // Write field user record so portal can list field staff
      await db.collection("companies").doc(companyId)
        .collection("fieldUsers").doc(member.id).set({
          memberstackId: member.id,
          name:        getMemberName(member),
          email:       member.auth?.email || "",
          companyId,   companyName: companyName || "",
          role:        "field",
          linkedAt:    firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });

      onLinked(companyId, companyName || "");
    } catch(e) {
      setErr(e.message || "Something went wrong. Check your connection and try again.");
    }
    setLoading(false);
  };

  const signOut = async () => { const ms = await waitForMS(); await ms.logout(); window.location.reload(); };

  return (
    <div className="auth-shell">
      <div className="auth-logo">JD</div>
      <div className="auth-card">
        <div className="auth-title">Link your account</div>
        <div className="auth-sub">
          Signed in as <strong style={{color:"var(--t1)"}}>{member.auth?.email}</strong>.
          Enter the one-time invite code from your office to connect your account to your company.
        </div>
        <div className="field-group">
          <label className="lbl">Invite Code</label>
          <input className="inp" value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
            placeholder="e.g. JDFIELD-ABC123"
            autoCapitalize="characters" autoCorrect="off" autoComplete="off"
            onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        {err && <div style={{fontSize:12,color:"var(--acc)",marginBottom:12,lineHeight:1.5}}>{err}</div>}
        <button className="btn btn-primary btn-full btn-lg" onClick={submit} disabled={loading}>
          {loading?<span className="spin">⟳</span>:<>{I.check} Connect Account</>}
        </button>
        <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--br)",fontSize:12,color:"var(--t3)",textAlign:"center"}}>
          Wrong account?{" "}
          <button onClick={signOut} style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontSize:12,fontFamily:"'Outfit',sans-serif"}}>Sign out</button>
        </div>
      </div>
    </div>
  );
}

/* ── Projects ─────────────────────────────────────────── */
function ProjectsScreen({ fieldUser, onSelect, clockedProjId }) {
  const [projects, setProjects] = useState([]);
  const [loading,  setLoading]  = useState(true);

  useEffect(() => {
    if (!fieldUser?.companyId) return;
    return db.collection("companies").doc(fieldUser.companyId).collection("projects")
      .onSnapshot(snap=>{ setProjects(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); }, ()=>setLoading(false));
  }, [fieldUser?.companyId]);

  const stColor = s => s==="Active"?"var(--green)":s==="Complete"?"var(--blue)":s==="On Hold"?"var(--amber)":"var(--t3)";
  if (loading) return <div className="empty"><span className="spin" style={{fontSize:24,color:"var(--t3)"}}>⟳</span></div>;

  return (
    <div className="scroll-pad">
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--t3)",fontFamily:"var(--mono)",letterSpacing:".08em",marginBottom:2}}>{(fieldUser?.companyName||"YOUR COMPANY").toUpperCase()}</div>
        <div style={{fontSize:18,fontWeight:700}}>Projects</div>
      </div>
      {projects.length===0
        ? <div className="empty"><div className="empty-ico">{I.home}</div><div style={{fontSize:12,color:"var(--t3)"}}>No projects yet. Your office will assign work here.</div></div>
        : projects.map(p=>{
            const wts = Array.isArray(p.workTypes)?p.workTypes:[];
            return (
              <div key={p.id} className="proj-card" onClick={()=>onSelect(p)}>
                <div className="proj-accent" style={{background:WORK_COLORS[wts[0]]||"var(--acc)"}}/>
                <div className="proj-body">

                    <div style={{fontWeight:700,fontSize:14,lineHeight:1.3}}>{p.name||p.clientName||"Unnamed Project"}</div>

/* ── DryDox (Enhanced) ───────────────────────────────── */
/* Full mobile-optimized DryDox with rooms, moisture points,
   equipment tracking, psychrometric data — syncs to Firestore */

const EQUIP_TYPES_F = [
  {v:"fan",l:"Air Mover",i:"🌀"},{v:"dehu",l:"Dehumidifier",i:"💧"},
  {v:"scrubber",l:"Air Scrubber",i:"🌬️"},{v:"injectidry",l:"InjectiDry",i:"💉"},
  {v:"mat",l:"Drying Mat",i:"🟫"},{v:"other",l:"Other",i:"🔧"},
];
const getETF = v => EQUIP_TYPES_F.find(t=>t.v===v)||EQUIP_TYPES_F[5];
const calcGPPF = (t,r) => { if(!t||!r)return 0; const c=(t-32)*5/9; const es=6.112*Math.exp((17.67*c)/(c+243.5)); const ea=es*(r/100); return Math.round(0.622*(ea/(1013.25-ea))*7000*10)/10; };
const calcDPF = (t,r) => { if(!t||!r)return 0; const c=(t-32)*5/9; const g=(17.27*c)/(237.7+c)+Math.log(r/100); return Math.round(((237.7*g)/(17.27-g))*9/5+32); };

// S500 equipment recommendation formulas (IICRC)
const S500_FACTORS = {class1:100,class2:50,class3:40,class4:40};
const S500_ACH_F = {cat1:0,cat2:4,cat3:6};
function calcS500F(rooms) {
  let fan=0, dehu=0, scrub=0;
  (rooms||[]).forEach(r=>{
    const sf=(parseFloat(r.widthFt)||0)*(parseFloat(r.depthFt)||0);
    const lf=2*((parseFloat(r.widthFt)||0)+(parseFloat(r.depthFt)||0));
    fan+=Math.max(Math.ceil(sf/50),Math.ceil(lf/14),1);
    const cf=sf*(parseFloat(r.ceilingFt)||8);
    dehu+=Math.max(Math.ceil((cf/(S500_FACTORS[r.materialClass||"class2"]||50))/80),sf>0?1:0);
    const ach=S500_ACH_F[r.category||"cat1"]||0;
    if(ach>0) scrub+=Math.max(Math.ceil((cf*ach/60)/500),1);
  });
  return {fan,dehu,scrub};
}

  const [f, setF] = useState({temp:"",rh:"",gpp:"",notes:"",roomId:"",surface:"",moistureContent:""});
  const [rf, setRF] = useState({label:"",widthFt:"12",depthFt:"10",ceilingFt:"8",category:"cat1",materialClass:"class2"});
  const [ef, setEF] = useState({type:"fan",brand:"",serial:"",roomId:"",notes:""});

  const projRef = fieldUser?.companyId && proj?.id
    ? db.collection("companies").doc(fieldUser.companyId).collection("projects").doc(proj.id)
    : null;

  // Firestore listeners
  useEffect(()=>{
    if (!projRef) return;
    const unsubs = [
      projRef.collection("dryingLogs").orderBy("createdAt","desc")
        .onSnapshot(s=>setLogs(s.docs.map(d=>({id:d.id,...d.data()}))),()=>{}),
      projRef.collection("dryingRooms").orderBy("createdAt","asc")
        .onSnapshot(s=>setRooms(s.docs.map(d=>({id:d.id,...d.data()}))),()=>{}),
      projRef.collection("dryingEquipment").orderBy("deployedAt","desc")
        .onSnapshot(s=>setEquip(s.docs.map(d=>({id:d.id,...d.data()}))),()=>{}),
    ];
    return ()=>unsubs.forEach(u=>u&&u());
  },[fieldUser?.companyId, proj?.id]);

  // Save reading
  const saveReading = async()=>{
    if (!f.rh&&!f.temp) return; setSaving(true);
    const temp=parseFloat(f.temp)||0, rh=parseFloat(f.rh)||0;
    const gpp = f.gpp ? parseFloat(f.gpp) : calcGPPF(temp,rh);
    const dewPoint = calcDPF(temp,rh);
    await projRef.collection("dryingLogs").add({
      day:`Day ${logs.length+1}`, techName:fieldUser.name, techMsId:fieldUser.memberstackId,
      temp, rh, gpp, dewPoint, roomId:f.roomId||null, surface:f.surface||"",
      moistureContent:parseFloat(f.moistureContent)||null,
      notes:f.notes, createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    });
    setF({temp:"",rh:"",gpp:"",notes:"",roomId:"",surface:"",moistureContent:""});
    setShow(null); setSaving(false);
  };

  // Save room
  const saveRoom = async()=>{
    if (!rf.label.trim()) return; setSaving(true);
    await projRef.collection("dryingRooms").add({
      label:rf.label.trim(), widthFt:parseFloat(rf.widthFt)||12,
      depthFt:parseFloat(rf.depthFt)||10, ceilingFt:parseFloat(rf.ceilingFt)||8,
      category:rf.category||"cat1", materialClass:rf.materialClass||"class2",
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    });
    setRF({label:"",widthFt:"12",depthFt:"10",ceilingFt:"8",category:"cat1",materialClass:"class2"});
    setShow(null); setSaving(false);
  };

  // Deploy equipment
  const saveEquip = async()=>{
    if (!ef.type) return; setSaving(true);
    await projRef.collection("dryingEquipment").add({
      type:ef.type, brand:ef.brand, serial:ef.serial,
      roomId:ef.roomId||null, notes:ef.notes,
      deployedAt:firebase.firestore.FieldValue.serverTimestamp(),
      removedAt:null, techName:fieldUser.name,
    });
    setEF({type:"fan",brand:"",serial:"",roomId:"",notes:""});
    setShow(null); setSaving(false);
  };

  // Remove equipment
  const removeEquip = async(eqId)=>{
    await projRef.collection("dryingEquipment").doc(eqId).update({

              <div><label className="lbl">Serial #</label><input className="inp" value={ef.serial} onChange={e=>setEF(p=>({...p,serial:e.target.value}))} placeholder="SN-0000"/></div>

/* ── Contents ─────────────────────────────────────────── */
function ContentsScreen({ proj, fieldUser }) {
  const [items,  setItems] = useState([]);
  const [show,   setShow]  = useState(false);
  const [f, setF]          = useState({name:"",room:"",disposition:"Non-Salvage",quantity:1,photos:[]});
  const [saving, setSaving]= useState(false);
  const fRef = useRef();

  useEffect(()=>{
    if (!fieldUser?.companyId||!proj?.id) return;
    return db.collection("companies").doc(fieldUser.companyId)
      .collection("projects").doc(proj.id).collection("contentsItems")
      .orderBy("createdAt","desc")
      .onSnapshot(snap=>setItems(snap.docs.map(d=>({id:d.id,...d.data()}))),()=>{});
  },[fieldUser?.companyId,proj?.id]);

  const addPhoto = e=>{
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader(); r.onload=ev=>setF(p=>({...p,photos:[...p.photos,{url:ev.target.result}]})); r.readAsDataURL(file);
    }); e.target.value="";
  };

  const save = async()=>{
    if (!f.name.trim()) return; setSaving(true);
    await db.collection("companies").doc(fieldUser.companyId)
      .collection("projects").doc(proj.id).collection("contentsItems").add({
        name:f.name.trim(), room:f.room.trim(), disposition:f.disposition, quantity:f.quantity,
        techName:fieldUser.name, techMsId:fieldUser.memberstackId,
        category:"Other", condition:"Unknown",
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
    setF({name:"",room:"",disposition:"Non-Salvage",quantity:1,photos:[]}); setShow(false); setSaving(false);
  };

  return (
    <div className="scroll-pad">
      <button className="btn btn-primary btn-full" style={{marginBottom:14}} onClick={()=>setShow(true)}>{I.plus} Add Contents Item</button>
      {items.length===0
        ?<div className="empty"><div className="empty-ico">{I.box}</div><div style={{fontSize:12,color:"var(--t3)"}}>No items yet.</div></div>
        :items.map(it=>{const dc=DISP_COLORS[it.disposition]||"var(--t2)";return(
          <div key={it.id} className="row">
            <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
              <div style={{fontWeight:600,fontSize:13}}>{it.name}</div>
              <span style={{background:dc+"22",color:dc,borderRadius:12,padding:"2px 8px",fontSize:9,fontWeight:700,flexShrink:0,fontFamily:"var(--mono)"}}>{it.disposition}</span>
            </div>
            <div style={{fontSize:11,color:"var(--t3)",marginTop:3}}>
              {it.room&&<span>{it.room} · </span>}<span>Qty {it.quantity||1}</span>{it.techName&&<span> · {it.techName}</span>}
            </div>
          </div>
        );})
      }
      {show&&(
        <div className="sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)setShow(false);}}>
          <div className="sheet">
            <div className="sheet-handle"/>
            <div className="sheet-title">Add Contents Item</div>
            <div style={{marginBottom:12}}><label className="lbl">Item Name *</label><input className="inp" value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="e.g. Samsung 65″ TV"/></div>
            <div className="g2" style={{marginBottom:12}}>
              <div><label className="lbl">Room</label><input className="inp" value={f.room} onChange={e=>setF(p=>({...p,room:e.target.value}))} placeholder="Living Room"/></div>
              <div><label className="lbl">Qty</label><input className="inp" type="number" value={f.quantity} onChange={e=>setF(p=>({...p,quantity:parseInt(e.target.value)||1}))} min={1} inputMode="numeric"/></div>
            </div>
            <div style={{marginBottom:12}}><label className="lbl">Disposition</label>
              <select className="sel" value={f.disposition} onChange={e=>setF(p=>({...p,disposition:e.target.value}))}>
                {DISPOSITIONS.map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            </div>
            <div style={{marginBottom:16}}>
              <label className="lbl">Photos</label>
              <div className="photo-grid">
                {f.photos.map((ph,i)=>(
                  <div key={i} className="photo-thumb">
                    <img src={ph.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    <button onClick={()=>setF(p=>({...p,photos:p.photos.filter((_,j)=>j!==i)}))}
                      style={{position:"absolute",top:2,right:2,width:16,height:16,borderRadius:"50%",background:"rgba(0,0,0,.75)",border:"none",color:"#fff",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                  </div>
                ))}
                <button className="photo-add" onClick={()=>fRef.current.click()}>{I.cam}<span>PHOTO</span></button>
                <input ref={fRef} type="file" accept="image/*" multiple capture="environment" style={{display:"none"}} onChange={addPhoto}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}>
              <button className="btn btn-ghost" onClick={()=>setShow(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<span className="spin">⟳</span>:<>{I.check} Save Item</>}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function NotesScreen({ proj, fieldUser }) {
  const [notes, setNotes] = useState([]);
  const [text,  setText]  = useState("");
  const [saving,setSaving]= useState(false);

  useEffect(()=>{
    if (!fieldUser?.companyId||!proj?.id) return;
    return db.collection("companies").doc(fieldUser.companyId)
      .collection("projects").doc(proj.id).collection("fieldNotes")
      .orderBy("createdAt","desc")
      .onSnapshot(snap=>setNotes(snap.docs.map(d=>({id:d.id,...d.data()}))),()=>{});
  },[fieldUser?.companyId,proj?.id]);

  const save=async()=>{
    if (!text.trim()) return; setSaving(true);
    await db.collection("companies").doc(fieldUser.companyId)
      .collection("projects").doc(proj.id).collection("fieldNotes").add({
        text:text.trim(), techName:fieldUser.name, techMsId:fieldUser.memberstackId,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
    setText(""); setSaving(false);
  };

  return (
    <div className="scroll-pad">
      <div style={{marginBottom:12}}>
        <textarea className="txa" value={text} onChange={e=>setText(e.target.value)} placeholder="Log today's site observations, decisions, conversations…" style={{minHeight:100}}/>
        <button className="btn btn-primary btn-full" style={{marginTop:8}} onClick={save} disabled={saving||!text.trim()}>
          {saving?<span className="spin">⟳</span>:<>{I.note} Add Field Note</>}
        </button>
      </div>
      {notes.length===0
        ?<div className="empty"><div className="empty-ico">{I.note}</div><div style={{fontSize:12,color:"var(--t3)"}}>No notes yet.</div></div>
        :notes.map(n=>(
          <div key={n.id} className="feed-note">
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700}}>{n.techName}</span>
              <span style={{fontSize:10,color:"var(--t3)",fontFamily:"var(--mono)"}}>{fmtDate(n.createdAt)} {fmtTime(n.createdAt)}</span>

            <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.6}}>{n.text}</div>

/* ══ ROOT ══════════════════════════════════════════════ */
function FieldApp() {
  // "checking" = waiting for Memberstack
  // "invite"   = logged in but no company-id yet
  // "ready"    = fully authed
  const [authState, setAuthState] = useState("checking");
  const [member,    setMember]    = useState(null);
  const [fieldUser, setFieldUser] = useState(null);
  const [screen,    setScreen]    = useState("projects");
  const [proj,      setProj]      = useState(null);
  const [online,    setOnline]    = useState(navigator.onLine);
  const [clockProjId,   setClockProjId]   = useState(null);
  const [clockProjName, setClockProjName] = useState("");

  useEffect(()=>{
    const on=()=>setOnline(true), off=()=>setOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  },[]);

  // ── Memberstack auth — mirrors portal's getMember() exactly ──────────
  useEffect(()=>{
    async function initMember(ms, m) {
      if (!m) {
        // Not signed in — open Memberstack's own login modal
        ms.openModal("login");
        return;
      }
      setMember(m);
      // company-id is the same custom field the portal writes when a staff
      // member accepts a portal invite, or that we write via invite code below
      const companyId = m.customFields?.["company-id"] || null;
      if (!companyId) { setAuthState("invite"); return; }

      const name = getMemberName(m);
      const profile = {
        memberstackId: m.id,
        name, email: m.auth?.email||"", companyId,
        companyName: m.customFields?.["company-name"] || "",
      };

      // Load clock state (non-blocking)
      db.collection("companies").doc(companyId)
        .collection("fieldUsers").doc(m.id).get()
        .then(s=>{ if(s.exists()&&s.data().clockedIn){ setClockProjId(s.data().clockedProjectId||null); setClockProjName(s.data().clockedProjectName||""); } })
        .catch(()=>{});

      setFieldUser(profile);
      setAuthState("ready");
    }

    async function boot() {
      const ms = await waitForMS();
      const { data: m } = await ms.getCurrentMember();
      await initMember(ms, m);

      // onAuthChange handles ALL session events:
      // - normal logout
      // - concurrent login from another device (Memberstack kicks the old session)
      // - token expiry
      ms.onAuthChange(async updated => {
        if (!updated) {
          setAuthState("checking");
          setMember(null); setFieldUser(null);
          ms.openModal("login");
          return;
        }
        await initMember(ms, updated);
      });
    }
    boot();
  },[]);

  const handleLinked = (companyId, companyName) => {
    if (!member) return;
    setFieldUser({ memberstackId:member.id, name:getMemberName(member), email:member.auth?.email||"", companyId, companyName });
    setAuthState("ready");
  };

  const handleSignOut = async () => { const ms=await waitForMS(); await ms.logout(); };

  const handleClock = async(action, pId, pName)=>{
    if (!fieldUser?.companyId||!fieldUser?.memberstackId) return;
    const isIn = action==="in";
    await db.collection("companies").doc(fieldUser.companyId)
      .collection("fieldUsers").doc(fieldUser.memberstackId)
      .set({ clockedIn:isIn, clockedProjectId:pId||null, clockedProjectName:pName||"" },{ merge:true });
    await db.collection("companies").doc(fieldUser.companyId)
      .collection("clockEvents").add({
        memberstackId:fieldUser.memberstackId, name:fieldUser.name,
        action, projectId:pId||null, projectName:pName||"",
        timestamp:firebase.firestore.FieldValue.serverTimestamp(),
      });
    setClockProjId(pId||null); setClockProjName(pName||"");
  };

  if (authState==="checking") return <Splash/>;
  if (authState==="invite")   return <InviteCodeScreen member={member} onLinked={handleLinked}/>;

  const pName = proj?.name||proj?.clientName||"Project";

  return (
    <div className="shell">
      {!online&&<div className="offline-bar">OFFLINE — changes will sync when back online</div>}
      <div className="topbar">
        {screen==="project" ? (
          <>
            <button className="back-btn" onClick={()=>{setProj(null);setScreen("projects");}}>{I.back} Projects</button>
            <div style={{textAlign:"right"}}><div className="topbar-ttl" style={{fontSize:13}}>{pName.length>22?pName.slice(0,22)+"…":pName}</div></div>
          </>
        ) : (
          <>
            <div><div className="topbar-ttl">Job-Dox Field</div><div className="topbar-sub">{(fieldUser?.companyName||"FIELD APP").toUpperCase()}</div></div>
            {clockProjId&&(
              <div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(26,217,138,.1)",border:"1px solid rgba(26,217,138,.2)",borderRadius:20,padding:"4px 10px"}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",display:"block"}}/>
                <span style={{fontSize:10,color:"var(--green)",fontWeight:700}}>CLOCKED IN</span>
              </div>
            )}
          </>
        )}
      </div>
      <div className="main">
        {screen==="projects"&&<ProjectsScreen fieldUser={fieldUser} onSelect={p=>{setProj(p);setScreen("project");}} clockedProjId={clockProjId}/>}
        {screen==="project" &&proj&&<ProjectDetail proj={proj} fieldUser={fieldUser} onBack={()=>{setProj(null);setScreen("projects");}} clockedProjId={clockProjId} onClockAction={handleClock}/>}
        {screen==="feed"    &&<FeedScreen    fieldUser={fieldUser}/>}
        {screen==="profile" &&<ProfileScreen fieldUser={fieldUser} onSignOut={handleSignOut}/>}
      </div>
      {screen!=="project"&&(
        <nav className="bottom-nav">
          {[["projects","Projects",I.home],["feed","Feed",I.feed],["profile","Profile",I.user]].map(([s,l,ic])=>(
            <button key={s} className={`nav-btn${screen===s?" active":""}`} onClick={()=>setScreen(s)}>{ic}<span>{l}</span></button>
          ))}
        </nav>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FieldApp/>);
</script>
